<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - Nail Salon</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { font-family: sans-serif; background: #fdf2f4; padding: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        h1, h2 { color: #d63384; }
        .section-separator { border: 0; border-top: 2px solid #ffb3c1; margin: 30px 0; }
        
        /* Estilos para las PQRS de Mongo */
        .pqrs-item { border-left: 5px solid #ffb3c1; background: #fff9fa; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        .pqrs-meta { display: flex; justify-content: space-between; font-size: 0.85em; color: #888; }
        .pqrs-type { background: #ffb3c1; color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>Panel de Administración</h1>
        <button onclick="location.href='index.html'">Ir al Inicio</button>

        <section>
            <h2>Gestión de Servicios</h2>
            <input id="title" placeholder="Nombre">
            <input id="price" placeholder="Precio">
            <input id="image" placeholder="Imagen URL">
            <button onclick="createService()">Crear</button>
            <div id="services" style="margin-top: 15px;"></div>
        </section>

        <hr class="section-separator">

        <section>
            <h2>Buzón de PQRS (MongoDB)</h2>
            <div id="pqrsList">
                <p>Cargando mensajes...</p>
            </div>
        </section>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>

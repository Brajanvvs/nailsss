<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Nail Salon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdf2f4; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: #d63384; border-bottom: 2px solid #ffb3c1; padding-bottom: 8px; }
        
        /* Estilos para servicios */
        .service-list { margin-bottom: 30px; }
        .item-service { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }

        /* Estilos para PQRS */
        .pqrs-box { background: #fff9fa; border-left: 5px solid #ffb3c1; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
        .pqrs-header { display: flex; justify-content: space-between; font-size: 0.8em; color: #888; margin-bottom: 8px; }
        .badge { background: #ffb3c1; color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        
        .btn-pdf { background-color: #2c3e50; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-pdf:hover { background-color: #1a252f; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Panel de Administración</h1>
        <button onclick="location.href='index.html'" style="margin-bottom: 20px;">Volver al Inicio</button>

        <section>
            <h2>Gestión de Usuarios</h2>
            <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <h3 style="margin-top: 0; color: #d63384;">Crear Nuevo Usuario</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 600px;">
                    <input id="newUserName" placeholder="Nombre completo" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                    <input id="newUserEmail" placeholder="Email" type="email" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                    <input id="newUserPassword" placeholder="Contraseña" type="password" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                    <select id="newUserRole" style="padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                        <option value="user">Usuario</option>
                        <option value="admin">Administrador</option>
                    </select>
                    <button onclick="createUser()" style="grid-column: span 2; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold;">Crear Usuario</button>
                </div>
            </div>
            <h3 style="color: #d63384;">Usuarios Registrados</h3>
            <div id="usersList" style="margin-bottom: 30px;">
                <p>Cargando usuarios...</p>
            </div>
        </section>

        <hr style="border: 0; border-top: 2px solid #ffb3c1; margin: 40px 0;">

        <section>
            <h2>Gestión de Servicios (PostgreSQL)</h2>
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <input id="title" placeholder="Nombre" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd; flex: 1;">
                <input id="price" placeholder="Precio" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd; width: 100px;">
                <input id="image" placeholder="URL Imagen" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd; flex: 1;">
                <button onclick="createService()" style="background: #ffb3c1; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Crear</button>
            </div>
            <div id="services" class="service-list"></div>
        </section>

        <hr style="border: 0; border-top: 2px solid #ffb3c1; margin: 40px 0;">

        <section id="admin-pqrs-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="border: none; margin: 0;">Buzón de PQRS (MongoDB)</h2>
                <button onclick="generarPDF()" class="btn-pdf">
                    📄 Descargar Reporte PDF
                </button>
            </div>
            <div id="pqrsList">
                <p>Cargando mensajes de los clientes...</p>
            </div>
        </section>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>

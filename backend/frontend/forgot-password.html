<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h1><a href="/index.html">Nail Salon</a></h1>

<div class="auth-container">

    <h2>Recuperar Contraseña</h2>

    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">
        Ingresa tu email y te enviaremos un link para restablecer tu contraseña.
    </p>

    <form id="forgotForm">
        <input type="email" id="email" placeholder="Tu email" required>
        <button type="submit">Enviar Link de Recuperación</button>
    </form>

    <div id="message" style="margin-top: 15px;"></div>

    <br>
    <a href="login.html">← Volver al Login</a>

</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value;
    const messageDiv = document.getElementById("message");
    
    messageDiv.innerHTML = "<span style='color: #666'>Enviando...</span>";
    
    try {
        const res = await fetch("/auth/request-reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        
        if (data.error) {
            messageDiv.innerHTML = `<span style="color: red">${data.error}</span>`;
        } else {
            messageDiv.innerHTML = `
                <div style="background: #d4edda; padding: 15px; border-radius: 5px; color: #155724;">
                    <strong>✓ Email enviado (revisa la consola del servidor para el link)</strong>
                    <br><br>
                    <small>Para producción, esto enviaría un email real. Por ahora el link aparece en la consola del backend.</small>
                </div>
            `;
            console.log("🔗 LINK REAL:", data.debug);
        }
    } catch (err) {
        messageDiv.innerHTML = `<span style="color: red">Error de conexión</span>`;
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>Nail Salon</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #fdf2f4 0%, #fff5f8 100%);
      margin: 0; padding: 20px; min-height: 100vh;
    }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* Header */
    header { 
      background: white; 
      border-radius: 20px; 
      padding: 30px; 
      box-shadow: 0 10px 40px rgba(214, 51, 132, 0.15);
      margin-bottom: 30px;
      text-align: center;
    }
    header h1 { 
      color: #d63384; 
      font-size: 48px; 
      margin: 0;
    }
    header h1 span { font-size: 24px; }
    
    /* User Bar */
    .user-bar { 
      background: linear-gradient(135deg, #d63384, #ff6b9d); 
      color: white; 
      padding: 20px 30px; 
      border-radius: 15px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      margin-bottom: 30px;
    }
    .user-bar a { color: white; text-decoration: none; margin-left: 20px; }
    .user-bar a:hover { text-decoration: underline; }
    
    /* Cards */
    .section { 
      background: white; 
      border-radius: 20px; 
      padding: 30px; 
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    .section h2 { 
      color: #d63384; 
      margin: 0 0 20px 0;
      font-size: 24px;
    }
    
    /* Menu Grid */
    .menu-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
      gap: 15px; 
    }
    .menu-card { 
      display: block; 
      background: #fff5f8; 
      padding: 25px 20px; 
      border-radius: 15px; 
      text-decoration: none; 
      color: #333;
      text-align: center;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .menu-card:hover { 
      transform: translateY(-5px);
      border-color: #d63384;
      box-shadow: 0 10px 30px rgba(214, 51, 132, 0.2);
    }
    .menu-card h3 { 
      margin: 0 0 8px 0; 
      color: #d63384;
      font-size: 18px;
    }
    .menu-card p { margin: 0; color: #666; font-size: 13px; }
    .menu-card.admin { background: #fff5f8; }
    .menu-card.client { background: #f0fdf4; }
    .menu-card.public { background: #f0f9ff; }
    
    /* Services Grid */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .service-card {
      background: linear-gradient(135deg, #fff, #fff5f8);
      border: 2px solid #ffb3c1;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .service-card:hover {
      border-color: #d63384;
      transform: scale(1.02);
    }
    .service-card h3 { color: #d63384; margin: 0 0 10px 0; }
    .service-card .price { 
      font-size: 24px; 
      font-weight: bold; 
      color: #27ae60; 
    }
    
    /* Calendar */
    .calendar-section { margin-top: 20px; }
    .calendar-section h3 { color: #d63384; margin-bottom: 15px; }
    .calendar-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 5px;
    }
    .calendar-table th {
      background: #d63384;
      color: white;
      padding: 12px;
      border-radius: 8px;
    }
    .calendar-table td {
      background: #fff5f8;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .calendar-table td:hover { background: #ffb3c1; }
    .calendar-table td.occupied { background: #e74c3c; color: white; }
    .calendar-table td.selected { background: #27ae60; color: white; }
    
    /* Nav */
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: #d63384;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 25px;
      background: white;
      transition: all 0.3s;
    }
    .nav-links a:hover { background: #d63384; color: white; }
    
    /* Quick Actions */
    .quick-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .btn {
      padding: 12px 25px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s;
    }
    .btn-primary { background: #d63384; color: white; }
    .btn-primary:hover { background: #c42d6f; }
    .btn-secondary { background: white; color: #d63384; border: 2px solid #d63384; }
    .btn-secondary:hover { background: #d63384; color: white; }
  </style>
</head>

<body>

<div class="container">
  
  <header>
    <h1>💅 <span>Nail Salon</span></h1>
    <p style="color: #666; margin-top: 10px;">Tu espacio de belleza y relax</p>
    
    <div class="nav-links">
      <a href="index.html">🏠 Inicio</a>
      <a href="pqrs.html">📨 PQRS</a>
    </div>
  </header>

  <div id="userBar" style="display: none;"></div>

  <!-- SERVICIOS -->
  <div class="section">
    <h2>✨ Servicios Disponibles</h2>
    <div class="services-grid" id="services"></div>
  </div>

  <!-- CALENDARIO DE CITAS -->
  <div class="section">
    <h2>📅 Agenda tu Cita</h2>
    <p style="color: #666; margin-bottom: 20px;">Selecciona un servicio y luego el horario disponible</p>
    
    <div class="calendar-section">
      <table class="calendar-table" id="calendar">
        <thead>
          <tr>
            <th>Hora</th>
            <th>Lunes</th>
            <th>Martes</th>
            <th>Miércoles</th>
            <th>Jueves</th>
            <th>Viernes</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>7:00</td>
            <td data-day="Lunes" data-time="7:00"></td>
            <td data-day="Martes" data-time="7:00"></td>
            <td data-day="Miércoles" data-time="7:00"></td>
            <td data-day="Jueves" data-time="7:00"></td>
            <td data-day="Viernes" data-time="7:00"></td>
          </tr>
          <tr>
            <td>12:00</td>
            <td data-day="Lunes" data-time="12:00"></td>
            <td data-day="Martes" data-time="12:00"></td>
            <td data-day="Miércoles" data-time="12:00"></td>
            <td data-day="Jueves" data-time="12:00"></td>
            <td data-day="Viernes" data-time="12:00"></td>
          </tr>
          <tr>
            <td>15:00</td>
            <td data-day="Lunes" data-time="15:00"></td>
            <td data-day="Martes" data-time="15:00"></td>
            <td data-day="Miércoles" data-time="15:00"></td>
            <td data-day="Jueves" data-time="15:00"></td>
            <td data-day="Viernes" data-time="15:00"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <h3 id="selectedServiceText" style="color: #27ae60; margin-top: 20px;"></h3>
  </div>

</div>

<!-- SCRIPTS -->
<script src="js/menu.js"></script>
<script src="js/services.js"></script>
<script src="js/appointments.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const user = JSON.parse(localStorage.getItem("user"));
    const userBar = document.getElementById("userBar");
    
    if (user) {
        userBar.style.display = "block";
        userBar.innerHTML = `
            <div>
              <span style="font-size: 20px;">👤 ${user.name}</span>
              <span style="opacity: 0.8">(${user.role === 'admin' ? 'Administrador' : 'Usuario'})</span>
            </div>
            <div>
              <a href="dashboard.html">📅 Mis Citas</a>
              <a href="#" onclick="logout()">🚪 Cerrar Sesión</a>
            </div>
        `;
        
        if (user.role === "admin") {
          const section = document.createElement("div");
          section.className = "section";
          section.innerHTML = `
            <h2>⚙️ Panel de Administración</h2>
            <div class="menu-grid">
              <a href="admin.html" class="menu-card admin"><h3>📊 Panel Admin</h3><p>Gestión completa</p></a>
              <a href="registro-clientes.html" class="menu-card admin"><h3>👥 Clientes</h3><p>Gestionar clientes</p></a>
              <a href="ventas.html" class="menu-card admin"><h3>💰 Ventas</h3><p>Nueva facturación</p></a>
            </div>
          `;
          document.querySelector(".container").insertBefore(section, document.querySelector(".section"));
        } else {
          const section = document.createElement("div");
          section.className = "section";
          section.innerHTML = `
            <h2>🛒 Área del Cliente</h2>
            <div class="menu-grid">
              <a href="shop.html" class="menu-card client"><h3>🛒 Tienda</h3><p>Comprar productos</p></a>
              <a href="dashboard.html" class="menu-card client"><h3>📅 Mis Citas</h3><p>Ver mis citas</p></a>
            </div>
          `;
          document.querySelector(".container").insertBefore(section, document.querySelector(".section"));
        }
    } else {
        const section = document.createElement("div");
        section.className = "section";
        section.innerHTML = `
          <h2>🔐 Ingreso / Registro</h2>
          <div class="menu-grid">
            <a href="login.html" class="menu-card public"><h3>🔐 Login</h3><p>Ingresar al sistema</p></a>
            <a href="registro-clientes.html" class="menu-card public"><h3>📝 Registrarse</h3><p>Crear cuenta</p></a>
            <a href="shop.html" class="menu-card public"><h3>🛒 Tienda</h3><p>Ver productos</p></a>
          </div>
        `;
        document.querySelector(".container").insertBefore(section, document.querySelector(".section"));
    }
});

function logout() {
    localStorage.removeItem("user");
    localStorage.removeItem("shopClient");
    location.reload();
}
</script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .token-error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .token-valid { background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

<h1><a href="/index.html">Nail Salon</a></h1>

<div class="auth-container">

    <h2>Nueva Contraseña</h2>

    <div id="tokenStatus"></div>

    <div id="resetFormContainer" style="display: none;">
        <form id="resetForm">
            <input type="hidden" id="email">
            <input type="hidden" id="token">
            
            <input type="password" id="newPassword" placeholder="Nueva contraseña" required>
            <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required>
            
            <button type="submit">Cambiar Contraseña</button>
        </form>
        
        <div id="message" style="margin-top: 15px;"></div>
    </div>

    <br>
    <a href="login.html">← Volver al Login</a>

</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token");
const email = urlParams.get("email");

const tokenStatus = document.getElementById("tokenStatus");
const formContainer = document.getElementById("resetFormContainer");

if (!token || !email) {
    tokenStatus.innerHTML = '<div class="token-error">Link inválido. Por favor solicita un nuevo link de recuperación.</div>';
} else {
    document.getElementById("email").value = email;
    document.getElementById("token").value = token;
    tokenStatus.innerHTML = '<div class="token-valid">✓ Link válido. Ingresa tu nueva contraseña.</div>';
    formContainer.style.display = "block";
}

document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const messageDiv = document.getElementById("message");
    
    if (newPassword !== confirmPassword) {
        messageDiv.innerHTML = '<span style="color: red">Las contraseñas no coinciden</span>';
        return;
    }
    
    if (newPassword.length < 6) {
        messageDiv.innerHTML = '<span style="color: red">La contraseña debe tener al menos 6 caracteres</span>';
        return;
    }
    
    messageDiv.innerHTML = "<span style='color: #666'>Procesando...</span>";
    
    try {
        const res = await fetch("/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, token, newPassword })
        });
        
        const data = await res.json();
        
        if (data.error) {
            messageDiv.innerHTML = `<span style="color: red">${data.error}</span>`;
        } else {
            messageDiv.innerHTML = `
                <div style="background: #d4edda; color: #155724; padding: 15px; border-radius: 5px;">
                    <strong>✓ Contraseña actualizada correctamente</strong>
                    <br><br>
                    <a href="login.html" style="color: #155724; font-weight: bold;">Ir al Login →</a>
                </div>
            `;
            document.getElementById("resetForm").reset();
        }
    } catch (err) {
        messageDiv.innerHTML = '<span style="color: red">Error de conexión</span>';
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda - Nail Salon</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdf2f4; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        .header { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #d63384; margin: 0; }
        
        .balance-box { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; padding: 15px 25px; border-radius: 10px; text-align: center; }
        .balance-box .amount { font-size: 28px; font-weight: bold; }
        
        .nav a { color: #d63384; margin: 0 10px; text-decoration: none; }
        
        .login-section { background: white; padding: 40px; border-radius: 15px; text-align: center; max-width: 400px; margin: 50px auto; }
        .login-section input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .login-section button { width: 100%; padding: 12px; background: #d63384; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        .product-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-card h3 { color: #d63384; margin: 0 0 10px 0; }
        .product-card .price { font-size: 24px; font-weight: bold; color: #27ae60; }
        .product-card .stock { color: #666; font-size: 14px; }
        .product-card button { width: 100%; padding: 10px; background: #d63384; color: white; border: none; border-radius: 5px; margin-top: 10px; cursor: pointer; }
        .product-card button:disabled { background: #ccc; }
        
        .cart-section { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        
        .recharge-section { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .recharge-section input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 150px; }
        .recharge-section button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        .success { background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
        
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-info span { color: #666; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div class="header">
        <h1>💅 Nail Salon - Tienda</h1>
        <div id="headerRight"></div>
    </div>
    
    <div id="loginSection" class="login-section" style="display: none;">
        <h2 style="color: #d63384;">Ingresa tu documento</h2>
        <input type="text" id="loginDocument" placeholder="Número de documento">
        <button onclick="login()">Entrar</button>
    </div>
    
    <div id="shopSection" style="display: none;">
        <div class="recharge-section">
            <h3 style="color: #3498db;">💳 Recargar Saldo</h3>
            <input type="number" id="rechargeAmount" placeholder="Monto a recargar">
            <button onclick="requestRecharge()">Solicitar Recarga</button>
        </div>
        
        <h2 style="color: #d63384; margin-top: 30px;">Productos Disponibles</h2>
        <div class="grid" id="productsGrid"></div>
        
        <div class="cart-section">
            <h3>🛒 Carrito</h3>
            <div id="cartItems"></div>
            <div style="text-align: center; margin-top: 15px;">
                <strong style="font-size: 20px;">Total: $<span id="cartTotal">0</span></strong>
                <br><br>
                <button onclick="buyWithBalance()" style="background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 16px;">
                    💰 Comprar con Saldo
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let currentClient = null;
let cart = [];
let products = [];

document.addEventListener("DOMContentLoaded", () => {
    checkLogin();
});

function checkLogin() {
    const saved = localStorage.getItem("shopClient");
    if (saved) {
        currentClient = JSON.parse(saved);
        showShop();
    } else {
        document.getElementById("loginSection").style.display = "block";
    }
}

function login() {
    const document = document.getElementById("loginDocument").value;
    if (!document) return alert("Ingrese documento");
    
    fetch(`/sales/client/${document}`)
        .then(res => res.json())
        .then(data => {
            if (data.found) {
                currentClient = data.client;
                localStorage.setItem("shopClient", JSON.stringify(currentClient));
                showShop();
            } else {
                alert("Cliente no encontrado. Regístrese primero en la página de registro.");
            }
        });
}

function logout() {
    localStorage.removeItem("shopClient");
    currentClient = null;
    location.reload();
}

function showShop() {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("shopSection").style.display = "block";
    
    document.getElementById("headerRight").innerHTML = `
        <div class="user-info">
            <div class="balance-box">
                <div>Tu Saldo</div>
                <div class="amount">$<span id="clientBalance">${currentClient.balance || 0}</span></div>
            </div>
            <div>
                <strong>${currentClient.name}</strong><br>
                <small>${currentClient.document_number}</small><br>
                <a href="#" onclick="logout()" style="color: #e74c3c;">Cerrar sesión</a>
            </div>
        </div>
    `;
    
    loadProducts();
}

function loadProducts() {
    fetch("/products")
        .then(res => res.json())
        .then(data => {
            products = data.filter(p => p.stock > 0);
            renderProducts();
        });
}

function renderProducts() {
    const container = document.getElementById("productsGrid");
    container.innerHTML = products.map(p => `
        <div class="product-card">
            <h3>${p.name}</h3>
            <p style="color: #666;">${p.description || ""}</p>
            <div class="stock">Stock: ${p.stock} ${p.unit}</div>
            <div class="price">$${parseFloat(p.price).toLocaleString()}</div>
            <button onclick="addToCart(${p.id})">Agregar</button>
        </div>
    `).join("");
}

function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;
    
    const existing = cart.find(item => item.product_id === productId);
    
    if (existing) {
        if (existing.quantity >= product.stock) {
            alert("Stock insuficiente");
            return;
        }
        existing.quantity++;
    } else {
        cart.push({
            product_id: product.id,
            product_name: product.name,
            quantity: 1,
            unit_price: parseFloat(product.price),
            stock: product.stock
        });
    }
    
    renderCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
}

function renderCart() {
    const container = document.getElementById("cartItems");
    const totalEl = document.getElementById("cartTotal");
    
    if (cart.length === 0) {
        container.innerHTML = "<p style='color: #666;'>Carrito vacío</p>";
        totalEl.textContent = "0";
        return;
    }
    
    let total = 0;
    container.innerHTML = cart.map((item, index) => {
        total += item.quantity * item.unit_price;
        return `
            <div class="cart-item">
                <div>
                    <strong>${item.product_name}</strong><br>
                    $${item.unit_price} x ${item.quantity}
                </div>
                <div>
                    <strong>$${(item.quantity * item.unit_price).toLocaleString()}</strong>
                    <button onclick="removeFromCart(${index})" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; margin-left: 10px;">X</button>
                </div>
            </div>
        `;
    }).join("");
    
    totalEl.textContent = total.toLocaleString();
}

function requestRecharge() {
    const amount = parseFloat(document.getElementById("rechargeAmount").value);
    
    if (!amount || amount <= 0) {
        alert("Ingrese un monto válido");
        return;
    }
    
    fetch("/balance/recharge", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ client_id: currentClient.id, amount })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert("✅ Solicitud de recarga enviada. Un administrador aprobará tu solicitud.");
            document.getElementById("rechargeAmount").value = "";
        }
    });
}

function buyWithBalance() {
    if (cart.length === 0) {
        alert("Carrito vacío");
        return;
    }
    
    const total = cart.reduce((sum, item) => sum + (item.quantity * item.unit_price), 0);
    
    if (total > (currentClient.balance || 0)) {
        alert("Saldo insuficiente. Solicite una recarga.");
        return;
    }
    
    if (!confirm(`Confirmar compra por $${total.toLocaleString()}?`)) return;
    
    fetch("/balance/purchase", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            client_id: currentClient.id,
            items: cart.map(item => ({
                product_id: item.product_id,
                product_name: item.product_name,
                quantity: item.quantity,
                unit_price: item.unit_price
            }))
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert(`✅ Compra realizada!\nNuevo saldo: $${data.remainingBalance.toLocaleString()}`);
            currentClient.balance = data.remainingBalance;
            localStorage.setItem("shopClient", JSON.stringify(currentClient));
            document.getElementById("clientBalance").textContent = data.remainingBalance.toLocaleString();
            cart = [];
            renderCart();
            loadProducts();
        }
    });
}
</script>

</body>
</html>

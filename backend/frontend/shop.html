<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda - Nail Salon</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fdf2f4 0%, #fff5f8 100%); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        header { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(214, 51, 132, 0.15); margin-bottom: 30px; text-align: center; }
        header h1 { color: #d63384; font-size: 42px; margin: 0; }
        header p { color: #666; margin-top: 5px; }
        header .nav { margin-top: 15px; }
        header .nav a { color: #d63384; margin: 0 15px; text-decoration: none; font-weight: 500; }
        header .nav a:hover { text-decoration: underline; }
        
        /* User Bar */
        .user-bar { background: linear-gradient(135deg, #d63384, #ff6b9d); color: white; padding: 20px 30px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-bar .info { display: flex; align-items: center; gap: 30px; }
        .user-bar .balance-box { background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 10px; }
        .user-bar .balance-box .label { font-size: 12px; opacity: 0.9; }
        .user-bar .balance-box .amount { font-size: 24px; font-weight: bold; }
        .user-bar .actions a { color: white; text-decoration: none; margin-left: 20px; }
        
        /* Login */
        .login-section { background: white; padding: 50px; border-radius: 20px; text-align: center; max-width: 400px; margin: 50px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .login-section h2 { color: #d63384; margin: 0 0 10px 0; }
        .login-section p { color: #666; margin-bottom: 20px; }
        .login-section input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; font-size: 14px; transition: border-color 0.3s; }
        .login-section input:focus { border-color: #d63384; outline: none; }
        .login-section button { width: 100%; padding: 14px; background: linear-gradient(135deg, #d63384, #ff6b9d); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .login-section button:hover { transform: scale(1.02); }
        .login-section .register-link { margin-top: 20px; color: #666; }
        .login-section .register-link a { color: #d63384; font-weight: bold; }
        
        /* Sections */
        .section { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .section h2 { color: #d63384; margin: 0 0 20px 0; font-size: 24px; }
        
        /* Recharge */
        .recharge-box { background: linear-gradient(135deg, #3498db, #5dade2); color: white; padding: 25px; border-radius: 15px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .recharge-box h3 { margin: 0; flex: 1; }
        .recharge-box input { padding: 12px; border: none; border-radius: 8px; width: 150px; }
        .recharge-box button { padding: 12px 25px; background: white; color: #3498db; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Products Grid */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: linear-gradient(135deg, #fff, #fff5f8); border: 2px solid #ffb3c1; padding: 25px; border-radius: 15px; text-align: center; transition: all 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: #d63384; box-shadow: 0 15px 40px rgba(214, 51, 132, 0.2); }
        .product-card h3 { color: #d63384; margin: 0 0 10px 0; font-size: 18px; }
        .product-card .description { color: #666; font-size: 13px; margin-bottom: 10px; min-height: 40px; }
        .product-card .stock { color: #666; font-size: 13px; margin-bottom: 10px; }
        .product-card .stock.low { color: #e74c3c; }
        .product-card .price { font-size: 28px; font-weight: bold; color: #27ae60; margin-bottom: 15px; }
        .product-card button { width: 100%; padding: 12px; background: #d63384; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .product-card button:hover { background: #c42d6f; }
        
        /* Cart */
        .cart-empty { text-align: center; color: #666; padding: 40px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 10px; margin-bottom: 10px; }
        .cart-item .info { flex: 1; }
        .cart-item .info strong { color: #333; }
        .cart-item .info span { color: #666; font-size: 14px; }
        .cart-item .actions { display: flex; align-items: center; gap: 10px; }
        .cart-item .qty-btn { width: 30px; height: 30px; background: #d63384; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .cart-item .remove-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        
        .cart-total { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; padding: 25px; border-radius: 15px; text-align: center; font-size: 28px; font-weight: bold; margin: 20px 0; }
        .cart-checkout { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .cart-checkout:hover { background: #219a52; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <header>
        <h1>💅 Tienda</h1>
        <p>Nail Salon - Tus productos de belleza</p>
        <div class="nav">
            <a href="index.html">🏠 Inicio</a>
            <a href="pqrs.html">📨 PQRS</a>
        </div>
    </header>

    <!-- Login Section -->
    <div id="loginSection" class="login-section" style="display: none;">
        <h2>🔐 Ingresa a la Tienda</h2>
        <p>Usa tu email y contraseña</p>
        <input type="email" id="loginEmail" placeholder="Tu email">
        <input type="password" id="loginPassword" placeholder="Tu contraseña">
        <button onclick="login()">Entrar</button>
        <p class="register-link">¿No tienes cuenta? <a href="registro-clientes.html">Regístrate aquí</a></p>
    </div>

    <!-- Shop Section -->
    <div id="shopSection" style="display: none;">
        
        <!-- User Bar -->
        <div id="userBar" class="user-bar">
            <div class="info">
                <div>
                    <span style="font-size: 18px;" id="clientName">Cliente</span>
                </div>
                <div class="balance-box">
                    <div class="label">Tu Saldo</div>
                    <div class="amount">$<span id="clientBalance">0</span></div>
                </div>
            </div>
            <div class="actions">
                <a href="#" onclick="logout()">🚪 Cerrar Sesión</a>
            </div>
        </div>

        <!-- Recarga -->
        <div class="section">
            <div class="recharge-box">
                <h3>💳 Recargar Saldo</h3>
                <input type="number" id="rechargeAmount" placeholder="Monto" min="1" max="999999">
                <button onclick="requestRecharge()">Solicitar</button>
            </div>
        </div>

        <!-- Productos -->
        <div class="section">
            <h2>🛍️ Productos Disponibles</h2>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- Carrito -->
        <div class="section">
            <h2>🛒 Tu Carrito</h2>
            <div id="cartItems">
                <div class="cart-empty">Tu carrito está vacío</div>
            </div>
            <div class="cart-total">
                Total: $<span id="cartTotal">0</span>
            </div>
            <button class="cart-checkout" onclick="buyWithBalance()">💰 Comprar con Saldo</button>
        </div>
    </div>
</div>

<script>
let currentClient = null;
let cart = [];
let products = [];

document.addEventListener("DOMContentLoaded", () => {
    checkLogin();
});

function checkLogin() {
    const saved = localStorage.getItem("shopClient");
    if (saved) {
        currentClient = JSON.parse(saved);
        showShop();
    } else {
        document.getElementById("loginSection").style.display = "block";
    }
}

function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    
    if (!email || !password) return alert("Ingrese email y contraseña");
    
    fetch("/sales/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else if (data.success) {
            currentClient = data.client;
            localStorage.setItem("shopClient", JSON.stringify(currentClient));
            showShop();
        }
    })
    .catch(err => alert("Error de conexión"));
}

function logout() {
    localStorage.removeItem("shopClient");
    location.reload();
}

function showShop() {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("shopSection").style.display = "block";
    document.getElementById("clientName").textContent = currentClient.name;
    document.getElementById("clientBalance").textContent = (currentClient.balance || 0).toLocaleString();
    loadProducts();
}

function loadProducts() {
    fetch("/products")
        .then(res => res.json())
        .then(data => {
            products = data.filter(p => p.stock > 0);
            renderProducts();
        });
}

function renderProducts() {
    const container = document.getElementById("productsGrid");
    container.innerHTML = products.map(p => `
        <div class="product-card">
            <h3>${p.name}</h3>
            <p class="description">${p.description || "Producto de Nail Salon"}</p>
            <p class="stock ${p.stock <= 5 ? 'low' : ''}">📦 Stock: ${p.stock} ${p.unit}</p>
            <div class="price">$${parseFloat(p.price).toLocaleString()}</div>
            <button onclick="addToCart(${p.id})">Agregar al Carrito</button>
        </div>
    `).join("");
}

function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;
    
    const existing = cart.find(item => item.product_id === productId);
    
    if (existing) {
        if (existing.quantity >= product.stock) {
            alert("Stock insuficiente");
            return;
        }
        existing.quantity++;
    } else {
        cart.push({
            product_id: product.id,
            product_name: product.name,
            quantity: 1,
            unit_price: parseFloat(product.price),
            stock: product.stock
        });
    }
    renderCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
}

function updateQty(index, delta) {
    const item = cart[index];
    if (delta > 0 && item.quantity >= item.stock) {
        alert("Stock insuficiente");
        return;
    }
    if (delta < 0 && item.quantity <= 1) {
        cart.splice(index, 1);
    } else {
        item.quantity += delta;
    }
    renderCart();
}

function renderCart() {
    const container = document.getElementById("cartItems");
    const totalEl = document.getElementById("cartTotal");
    
    if (cart.length === 0) {
        container.innerHTML = "<div class='cart-empty'>🛒 Tu carrito está vacío</div>";
        totalEl.textContent = "0";
        return;
    }
    
    let total = 0;
    container.innerHTML = cart.map((item, index) => {
        total += item.quantity * item.unit_price;
        return `
            <div class="cart-item">
                <div class="info">
                    <strong>${item.product_name}</strong><br>
                    <span>$${item.unit_price.toLocaleString()} x ${item.quantity}</span>
                </div>
                <div class="actions">
                    <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                    <span>${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                    <button class="remove-btn" onclick="removeFromCart(${index})">✕</button>
                </div>
            </div>
        `;
    }).join("");
    
    totalEl.textContent = total.toLocaleString();
}

function requestRecharge() {
    const amount = parseFloat(document.getElementById("rechargeAmount").value);
    
    if (!amount || amount <= 0) {
        alert("Ingrese un monto válido");
        return;
    }
    
    if (amount > 999999) {
        alert("El monto máximo es 999,999");
        return;
    }
    
    fetch("/balance/recharge", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ client_id: currentClient.id, amount })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert("✅ Solicitud de recarga enviada. Un administrador aprobará tu solicitud.");
            document.getElementById("rechargeAmount").value = "";
        }
    });
}

function buyWithBalance() {
    if (cart.length === 0) {
        alert("Carrito vacío");
        return;
    }
    
    const total = cart.reduce((sum, item) => sum + (item.quantity * item.unit_price), 0);
    
    if (total > (currentClient.balance || 0)) {
        alert("Saldo insuficiente. Solicite una recarga.");
        return;
    }
    
    if (!confirm(`Confirmar compra por $${total.toLocaleString()}?`)) return;
    
    fetch("/balance/purchase", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            client_id: currentClient.id,
            items: cart.map(item => ({
                product_id: item.product_id,
                product_name: item.product_name,
                quantity: item.quantity,
                unit_price: item.unit_price
            }))
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert(`✅ Compra realizada!\nNuevo saldo: $${data.remainingBalance.toLocaleString()}`);
            currentClient.balance = data.remainingBalance;
            localStorage.setItem("shopClient", JSON.stringify(currentClient));
            document.getElementById("clientBalance").textContent = data.remainingBalance.toLocaleString();
            cart = [];
            renderCart();
            loadProducts();
        }
    });
}
</script>

</body>
</html>
